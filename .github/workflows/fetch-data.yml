name: Fetch openFDA Data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch openFDA data
        run: python scripts/fetch-openfda.py

      - name: Commit updated data
        run: |
          git config user.name "EpiDataKit Bot"
          git config user.email "bot@epidatakit.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update openFDA data $(date +%Y-%m-%d)"
          git push
